<div class="flash-sale-container">
  <div class="header text-center py-4">
    <h2 class="flash-title">
        <i class="bi bi-stars"></i> Flash Sale <i class="bi bi-stars"></i>
    </h2>
    <p>Limited time offers - Up to 50% off!</p>
    
    <div class="timer-wrapper d-flex justify-content-center gap-2 mt-3">
      <div><i class="bi bi-clock"></i></div>
      <div class="timer-box"><span>{{hours}}</span><small>Hours</small></div>
      <div class="timer-box"><span>{{minutes}}</span><small>Minutes</small></div>
      <div class="timer-box"><span>{{seconds}}</span><small>Seconds</small></div>
    </div>
  </div>

  <div class="container mt-5">
    <div class="row g-3">
      <div *ngIf="products.length === 0" class="loading text-center ">Loading Products...</div>
      
      <div class="col-md-3" *ngFor="let product of products">
       <div class="card product-card">
      <img [src]="'http://shopbag.runasp.net/Images/' + product.mainImg" class="card-img-top" [alt]="product.name" height="350px">
        <div class="badge-discount">-{{product.discount}}%</div>
        <div class="badge-flash">FLASH SALE</div>

          <div class="card-body">
            <h6 class="product-name">{{product.name}}</h6>
            <div class="price-section">
              <span class="current-price">{{product.priceAfterDiscount.toFixed(2)}} EGP</span>
              <span class="old-price">{{product.price}} EGP</span>
            </div>
            <button class="btn btn-add-cart w-100 mt-3">Add to Cart</button>
          </div>
        </div>
        </div>
      </div>
   <div class="d-flex justify-content-center"> 
    <button class="btn btn-sale" routerLink="/product">View All Flash Sale Items</button>
  </div>
    </div>
  </div>
