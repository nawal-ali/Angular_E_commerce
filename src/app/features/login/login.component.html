<div class="login-container">
    <div class="login-card shadow-lg">
        <!-- Home Logo/Link -->
        <div class="logo-container">
            <a routerLink="/" class="home-link" title="Go to Home">
                <i class="fa-solid fa-house"></i>
            </a>
        </div>

        <div class="card-top text-center text-white">
            <div class="badge">Sign in</div>
            <h2>Welcome Back</h2>
            <p>Sign in to your account</p>
        </div>

        <div class="card-body">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
                <!-- Email Field -->
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" formControlName="email" class="form-control" placeholder="Enter your email"
                            [class.is-invalid]="isFieldInvalid('email')" />
                    </div>
                    <div class="form-text text-danger" *ngIf="isFieldInvalid('email')">
                        Please enter a valid email address.
                    </div>
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                            class="form-control" placeholder="Enter your password"
                            [class.is-invalid]="isFieldInvalid('password')" />
                        <button type="button" class="btn btn-outline-secondary" (click)="showPassword = !showPassword"
                            tabindex="-1">
                            <i [class]="showPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'"></i>
                        </button>
                    </div>
                    <div class="form-text text-danger" *ngIf="isFieldInvalid('password')">
                        Password is required (min 6 characters).
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" formControlName="rememberMe" />
                        <label class="form-check-label" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="/forgot-password" class="forgot-link">Forgot Password?</a>
                </div>

                <!-- API Error Message -->
                <div class="alert alert-danger" role="alert" *ngIf="apiError">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    {{ apiError }}
                </div>

                <!-- Submit Button -->
                <div class="d-grid gap-2 mb-3">
                    <button type="submit" class="btn btn-primary btn-lg" [disabled]="!loginForm.valid || isLoading">
                        <span *ngIf="!isLoading"><i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In</span>
                        <span *ngIf="isLoading"><i class="fa-solid fa-spinner fa-spin"></i> Signing in...</span>
                    </button>
                </div>

                <!-- Sign Up Link -->
                <div class="text-center">
                    <p class="mb-0">
                        Don't have an account?
                        <a routerLink="/register" class="signup-link">Sign up here</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
