<nav class="navbar navbar-expand-lg custom-navbar sticky-top">
  <div class="container">

    <!-- LOGO -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/home" (click)="closeNav(navCollapse)">
      <div class="logo-wrap">
        <img src="assets/images/logo.PNG" alt="Falgon Clothes" width="42">
      </div>
      <div>
        <h5 class="brand-title mb-0">ShopBag</h5>
        <small class="brand-subtitle">Fashion Store</small>
      </div>
    </a>

    <!-- MOBILE TOGGLER -->
    <button class="navbar-toggler border-0 shadow-none" data-bs-target="#navbarText" (click)="closeNav(navCollapse)">
      <i class="fa-solid fa-bars-staggered"></i>
    </button>

    <!-- NAV CONTAINER (Added #navCollapse variable) -->
    <div class="collapse navbar-collapse" id="navbarText" #navCollapse>

      <!-- LINKS -->
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 nav-links-wrap">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active" (click)="closeNav(navCollapse)">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/product" routerLinkActive="active"
            (click)="closeNav(navCollapse)">Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active" (click)="closeNav(navCollapse)">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contact" routerLinkActive="active"
            (click)="closeNav(navCollapse)">Contact</a>
        </li>
      </ul>

      <!-- RIGHT LINKS -->
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        @if(this.globalService.isLoggedIn()) {
        <li class="nav-item me-lg-3">
          <div class="welcome-user">
            <div class="user-avatar">{{ globalService.getUser()?.userName?.charAt(0) }}</div>
            <div class="d-flex flex-column">
              <small class="welcome-label">Welcome back</small>
              <span class="welcome-name">{{ globalService.getUser()?.name }}</span>
            </div>
          </div>
        </li>
        <li class="nav-item">
          <a class="icon-btn" routerLink="/whishlist" (click)="closeNav(navCollapse)">
            <i class="bi bi-heart"></i>
          </a>
        </li>
        <li class="nav-item">
          <a class="icon-btn position-relative" routerLink="/cart" (click)="closeNav(navCollapse)">
            <i class="bi bi-cart2"></i>
            @if (cartCount > 0) {
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge">{{
              cartCount }}</span>
            }
          </a>
        </li>
        <li class="nav-item">
          <a class="icon-btn" [routerLink]="['/profile', globalService.getUser()?.id]" (click)="closeNav(navCollapse)">
            <i class="bi bi-person"></i>
          </a>
        </li>
        <li class="nav-item">
          <button class="btn btn-theme" routerLink="/login" (click)="handleLogout(); closeNav(navCollapse)">
            <i class="bi bi-box-arrow-right me-2"></i>Logout
          </button>
        </li>
        } @else {
        <li class="nav-item">
          <button class="btn btn-login" routerLink="/login" (click)="closeNav(navCollapse)">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
          </button>
        </li>
        <li class="nav-item">
          <button class="btn btn-theme" routerLink="/register" (click)="closeNav(navCollapse)">
            <i class="bi bi-person-plus me-2"></i>Register
          </button>
        </li>
        }
      </ul>

    </div>
  </div>
</nav>
