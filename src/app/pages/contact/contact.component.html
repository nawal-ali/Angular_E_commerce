 <div class="contact-wrapper">
  <header class="hero-section">
    <div class="overlay d-flex flex-column align-items-center justify-content-center text-center">
      <h1 class="hero-title">Contact Us</h1>
      <p class="subtitle">Any questions or remarks? Just write us a message!</p>
    </div>
  </header>

  <main class="form-area">
    <div class="container">
        <form class="actual-form">
        
            <div class="input-row">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter a valid email address">
                </div>
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" placeholder="Enter your Name">
                </div>
            </div> 
            <div class="message-container">
                <div class="message-header">
                    <span class="word-count"><i class="bi bi-pencil"></i> 0/100 words</span>
                </div>
                <textarea placeholder="Share your message (max. 100 words)..." rows="5"></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>
</main>
 
  <footer class="info-footer">
    <div class="info-container">
      <div class="info-card">
        <div class="icon-circle"><i class="bi bi-handbag-fill"></i></div>
        <h3>About Shop Bag</h3>
       <p>Your Fashion Destination<br>Premium Quality Collections</p>
      </div>
      <div class="info-card">
        <div class="icon-circle"><i class="fas fa-phone-alt"></i></div>
        <h3>Phone</h3>
        <p>+ 912 3 567 8987<br>+ 912 5 252 3336</p>
      </div>
      <div class="info-card">
        <div class="icon-circle"><i class="fas fa-map-marker-alt"></i></div>
        <h3>Our Office Location</h3>
        <p>The Interior Design Studio Company<br>The Courtyard, Al Quoz 1, Colorado, USA</p>
      </div>
    </div>
  </footer>
</div>
