<div class="main-container container-fluid p-0">

  <!-- // category section -->
  <div class="category-bar-wrapper bg-white sticky-top">
    <div class="container py-2 d-flex justify-content-center align-items-center gap-2">
      <button class="category-btn" [class.active]="selectedCategoryId === null" (click)="selectCategory(null)">
        All
      </button>

      <button *ngFor="let cat of categories" class="category-btn" [class.active]="selectedCategoryId === cat.id"
        (click)="selectCategory(cat.id)">
        {{cat.name}}
      </button>
    </div>
  </div>

  <!-- // product section -->
  <div class="container py-5">


    <!-- // filter , search , sort product section -->

    <div class="header-section mb-4">
      <!--  Search input + filter btn  + Relevance btn  -->
      <div class="actions d-flex gap-2">
        <div class="input-group search-group">
          <input type="text" class="form-control border-0" placeholder="Search products..." (input)="onSearch($event)">
        </div>
        <select class="form-select w-auto relevancy-select border-0" (change)="onSort($event)">
          <option value="relevance">Relevance</option>
          <option value="high">Price: High to Low</option>
          <option value="low">Price: Low to High</option>
        </select>

        <button class="btn btn-outline-dark" (click)="isFilterVisible = !isFilterVisible">
          <i class="bi bi-sliders"></i> Filters
        </button>
      </div>
      <app-filter-modal *ngIf="isFilterVisible" (onFilterChange)="handleFilterChange($event)"
        (onClose)="isFilterVisible = false">
      </app-filter-modal>
      <!-- [brands]="brands"  -->
      <div>
        <h1 class="page-title mb-0">All Products</h1>
        <p class="text-muted product-count mb-0">Showing {{filteredProducts.length}} products</p>
      </div>
    </div>

    <div class="row g-4 product-grid">
      <!-- product not found  -->
      <div *ngIf="filteredProducts.length === 0" class="col-12 text-center notFount  py-5">
        <p class="text-muted">No products found in this category...</p>
      </div>

      <div class="col-md-3" *ngFor="let product of filteredProducts">
        <div class="card h-100 product-card shadow-sm border-0">

          <div class="card-img-wrapper">
            <!-- // product image  -->
            <img [src]="'http://shopbag.runasp.net/Images/' + product.mainImg" class="card-img-top cursor-pointer"
              [routerLink]="['/productDetails', product.id]">
            <!-- icons during hover  -->
            <div class="product-actions d-flex flex-column gap-2 position-absolute top-0 end-0 m-3">
              
              <!-- Replace ONLY this button in products.component.html -->
              <!-- Find the comment: heart icon -->
              <!-- AFTER: -->
              <button class="btn btn-light btn-sm shadow-sm rounded-circle action-btn shadow"
                (click)="toggleWishlist(product)" [disabled]="isPendingWishlist(product.id)"
                [title]="isWishlisted(product.id) ? 'Remove from wishlist' : 'Add to wishlist'">
                <i class="bi" [class.bi-heart-fill]="isWishlisted(product.id)"
                  [class.bi-heart]="!isWishlisted(product.id)"
                  [style.color]="isWishlisted(product.id) ? 'var(--primary-color)' : ''">
                </i>
              </button>

              <!-- eye icon -->
              <button class="btn btn-light btn-sm shadow-sm rounded-circle action-btn shadow"
                [routerLink]="['/productDetails', product.id]">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="card-body d-flex flex-column p-3">

            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="text-muted small product-category">{{product.categoryName}}</span>
            </div>

            <h5 class="card-title product-name mb-3">{{product.name}}</h5>

            <div class="price-section d-flex justify-content-between align-items-center mt-auto mb-3">
              <div>
                <span class="current-price ">
                  ${{product.priceAfterDiscount}}
                </span>

                <span class="old-price text-muted text-decoration-line-through small me-2">
                  ${{product.price}}
                </span>

              </div>
              <span *ngIf="product.discount > 0" class="discount-badge">
                {{product.discount}}% off
              </span>
            </div>

            <button class="btn btn-dark w-100 add-to-cart-btn mt-auto" (click)="addToCart(product)">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
